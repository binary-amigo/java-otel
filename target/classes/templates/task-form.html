<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${task.id == null ? 'New Task' : 'Edit Task'}"></title>
</head>
<body>
    <div th:fragment="content">
        <h2 th:text="${task.id == null ? 'Create New Task' : 'Edit Task'}"></h2>
        
        <form th:action="${task.id == null ? '/tasks' : '/tasks/' + task.id}" 
              th:object="${task}" method="post" class="mt-4">
            
            <div class="mb-3">
                <label for="title" class="form-label">Title</label>
                <input type="text" class="form-control" id="title" th:field="*{title}" required>
            </div>
            
            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
            </div>
            
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="completed" th:field="*{completed}">
                <label class="form-check-label" for="completed">Completed</label>
            </div>
            
            <div class="mb-3">
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="/tasks" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
